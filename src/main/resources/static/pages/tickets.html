<!doctype html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk - Ticket</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="app-page admin-page">
<header class="app-header">
    <a class="brand-link" href="admin-dashboard.html" aria-label="Torna alla dashboard">
        <span class="brand-mark" aria-hidden="true">H</span>
        <span>
            <span class="eyebrow">Helpdesk</span>
            <strong>Ticket</strong>
        </span>
    </a>

    <nav class="top-nav" aria-label="Navigazione ticket">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="tickets.html" aria-current="page">Ticket</a>
        <a id="users-nav-link" href="users.html">Utenti</a>
    </nav>

    <a class="ghost-button logout-btn" href="login.html">Logout</a>
</header>

<main class="home-shell admin-shell">
    <section class="admin-panel admin-data-section" aria-labelledby="tickets-title">
        <div class="section-heading-row">
            <div class="section-heading">
                <p class="eyebrow">Coda supporto</p>
                <h1 id="tickets-title">Ticket</h1>
                <p>Vista completa dei ticket disponibili per la gestione.</p>
            </div>

            <span class="table-count"><span id="tickets-count">0</span>&nbsp;ticket</span>
        </div>

        <form class="table-toolbar" id="tickets-filter-form">
            <div class="field-group">
                <label for="ticket-search">Cerca</label>
                <input id="ticket-search" type="search" placeholder="Titolo, descrizione o richiedente">
            </div>

            <div class="field-group">
                <label for="status-filter">Stato</label>
                <select id="status-filter">
                    <option value="">Tutti</option>
                    <option value="OPEN">Aperto</option>
                    <option value="IN_PROGRESS">In lavorazione</option>
                    <option value="WAITING_FOR_CUSTOMER">In attesa cliente</option>
                    <option value="RESOLVED">Risolto</option>
                    <option value="CLOSED">Chiuso</option>
                </select>
            </div>

            <div class="field-group">
                <label for="priority-filter">Priorita</label>
                <select id="priority-filter">
                    <option value="">Tutte</option>
                    <option value="URGENT">Urgente</option>
                    <option value="HIGH">Alta</option>
                    <option value="MEDIUM">Media</option>
                    <option value="LOW">Bassa</option>
                </select>
            </div>

            <div class="field-group">
                <label for="assignment-filter">Assegnazione</label>
                <select id="assignment-filter">
                    <option value="">Tutti</option>
                    <option value="assigned">Assegnati</option>
                    <option value="unassigned">Non assegnati</option>
                </select>
            </div>
        </form>

        <div class="admin-table-wrap admin-table-scroll full-list-scroll">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>Ticket</th>
                    <th>Categoria</th>
                    <th>Priorita</th>
                    <th>Stato</th>
                    <th>Assegnato</th>
                    <th>Creato</th>
                </tr>
                </thead>
                <tbody id="tickets-table-body">
                <tr>
                    <td colspan="6">Caricamento ticket...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
<script type="module" src="../js/tickets.js"></script>
</body>
</html>
