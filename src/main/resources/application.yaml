spring:
  application:
    name: helpdesk

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/helpdesk_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

helpdesk:
  registration:
    enabled: false
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production}
    expiration-seconds: 86400
